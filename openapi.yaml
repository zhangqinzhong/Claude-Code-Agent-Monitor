        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset (clamped to >= 0).
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter by run status (open string, e.g. running | completed | error | failed). The literal value `all` is treated as no filter.
