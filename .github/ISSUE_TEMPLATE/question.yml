name: Question / Help
description: Ask a question about setup, usage, or how something works.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For general questions, please check the [README](https://github.com/hoangsonww/Claude-Code-Agent-Monitor/blob/master/README.md) and [ARCHITECTURE.md](https://github.com/hoangsonww/Claude-Code-Agent-Monitor/blob/master/ARCHITECTURE.md) first.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What have you already tried?
      description: Describe what you've already looked at or attempted.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have read the README and ARCHITECTURE docs.
          required: true
        - label: I searched existing issues and did not find an answer.
          required: true
